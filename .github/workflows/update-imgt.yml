name: Daily IMGT database update

on:
  schedule:
    - cron: '0 16 * * *'  # 00:00 Shanghai time (UTC+8)
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write

jobs:
  update-database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install HMMER 3.3.2
        run: |
          curl -sSLO http://eddylab.org/software/hmmer/hmmer-3.3.2.tar.gz
          tar xzf hmmer-3.3.2.tar.gz
          cd hmmer-3.3.2
          ./configure --prefix=/usr/local
          make -j$(nproc)
          sudo make install

      - name: Make muscle executable
        run: chmod +x bin/muscle

      - name: Clean cached HTML to force re-download from IMGT
        run: rm -f build_pipeline/IMGT_sequence_files/htmlfiles/*.html

      - name: Run pipeline
        run: |
          cd build_pipeline
          mkdir -p IMGT_sequence_files/fastafiles
          mkdir -p curated_alignments
          mkdir -p muscle_alignments
          mkdir -p HMMs
          python RipIMGT.py
          python FormatAlignments.py
          hmmbuild --hand HMMs/ALL.hmm curated_alignments/ALL.stockholm
          hmmpress -f HMMs/ALL.hmm

      - name: Copy generated data to package
        run: |
          cp build_pipeline/curated_alignments/germlines.py lib/python/anarci/
          rm -rf lib/python/anarci/dat/HMMs
          mkdir -p lib/python/anarci/dat/HMMs
          cp build_pipeline/HMMs/* lib/python/anarci/dat/HMMs/

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if ALL.hmm has real changes (beyond the DATE timestamp)
          hmm_real_change=false
          if git diff -- lib/python/anarci/dat/HMMs/ALL.hmm > /dev/null 2>&1; then
            git show HEAD:lib/python/anarci/dat/HMMs/ALL.hmm 2>/dev/null | sed '/^DATE  /d' > /tmp/old_normalized.hmm
            sed '/^DATE  /d' lib/python/anarci/dat/HMMs/ALL.hmm > /tmp/new_normalized.hmm
            if ! diff -q /tmp/old_normalized.hmm /tmp/new_normalized.hmm > /dev/null 2>&1; then
              hmm_real_change=true
            fi
          fi

          # Stage germlines.py
          git add lib/python/anarci/germlines.py

          # Stage HMM files only if there is a real content change
          if $hmm_real_change; then
            git add lib/python/anarci/dat/HMMs/
          fi

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily IMGT database update ($(date +%Y-%m-%d))"
            git push
          fi
