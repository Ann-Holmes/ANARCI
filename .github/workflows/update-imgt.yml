name: Daily IMGT database update

on:
  schedule:
    - cron: '0 16 * * *'  # 00:00 Shanghai time (UTC+8)
  workflow_dispatch:       # allow manual trigger

jobs:
  update-database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install HMMER 3.3.2
        run: |
          curl -sSLO https://github.com/EddyRivasLab/hmmer/archive/refs/tags/v3.3.2.tar.gz
          tar xzf v3.3.2.tar.gz
          cd hmmer-3.3.2
          ./configure --prefix=/usr/local
          make -j$(nproc)
          sudo make install

      - name: Make muscle executable
        run: chmod +x bin/muscle

      - name: Clean cached HTML to force re-download from IMGT
        run: rm -f build_pipeline/IMGT_sequence_files/htmlfiles/*.html

      - name: Run pipeline
        run: |
          cd build_pipeline
          mkdir -p IMGT_sequence_files/fastafiles
          mkdir -p curated_alignments
          mkdir -p muscle_alignments
          mkdir -p HMMs
          python RipIMGT.py
          python FormatAlignments.py
          hmmbuild --hand HMMs/ALL.hmm curated_alignments/ALL.stockholm
          hmmpress -f HMMs/ALL.hmm

      - name: Copy generated data to package
        run: |
          cp build_pipeline/curated_alignments/germlines.py lib/python/anarci/
          rm -rf lib/python/anarci/dat/HMMs
          mkdir -p lib/python/anarci/dat/HMMs
          cp build_pipeline/HMMs/* lib/python/anarci/dat/HMMs/

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/python/anarci/germlines.py lib/python/anarci/dat/HMMs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily IMGT database update ($(date +%Y-%m-%d))"
            git push
          fi
